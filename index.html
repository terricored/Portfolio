<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>terricored portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/terricored/Portfolio/main/assets/icon.png">
</head>

<body>

    <div id="loading-screen" class="loader-overlay">
        <img src="https://raw.githubusercontent.com/terricored/Portfolio/main/assets/wormload.gif" alt="Loading..." class="loader-media">
    </div>

    <div id="portfolio-wrapper">

        <section id="main-page" class="page active" data-page="home">
            <div class="container">
                <div class="center-circle">
                    <div class="base-layer"></div>
                    <div class="hover-mid-layer"></div>
                    <div class="hover-overlay-layer"></div>
                </div>
            </div>
            <footer class="main-footer">
                юля шаяхметова!
            </footer>
        </section>

        <section id="art-detail-page" class="page" data-page="detail">
            <button id="back-button" aria-label="Go back">← назад</button>

            <main id="detail-content-wrapper" class="detail-content-wrapper">
            </main>

        </section>

    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
